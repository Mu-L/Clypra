name: Feature Request
description: Suggest a new feature for Clypra
title: "[Feature]: "
labels: ["type: feature"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're facing
      placeholder: I want to add transitions between clips but there's no way to do it...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature you'd like
      placeholder: Add a transitions panel with fade, dissolve, and wipe options...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions?
      placeholder: I could use another editor, but I prefer Clypra...

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would be useful
        - Very important
        - Critical for my workflow
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information (screenshots, mockups, examples from other editors)
